<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">

    <h2 class="footer-heading">{{ site.title | escape }}</h2>

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <li class="p-name">
            {%- if site.author -%}
              {{ site.author | escape }}
            {%- else -%}
              {{ site.title | escape }}
            {%- endif -%}
            </li>
            {%- if site.email -%}
            <li><a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a></li>
            {%- endif -%}
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        {%- include social.html -%}
      </div>

      <div class="footer-col footer-col-3">
        <p>{{- site.description | escape -}}</p>
      </div>
    </div>

  </div>

</footer>

<script>
  (function () {
    var toggle = document.getElementById('theme-toggle');
    if (!toggle) return;
    var root = document.documentElement;

    function render() {
      // Show the icon for the theme you'd switch TO.
      toggle.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
    }
    render();

    toggle.addEventListener('click', function () {
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      render();
    });
  })();
</script>

<script>
  // BibTeX dialogs: open on button click, copy to clipboard, close on
  // the × button or a click on the backdrop.
  (function () {
    document.querySelectorAll('.bibtex-btn').forEach(function (btn) {
      var dlg = document.getElementById(btn.getAttribute('data-dialog'));
      if (!dlg) return;

      btn.addEventListener('click', function () { dlg.showModal(); });
      dlg.querySelector('.bibtex-close').addEventListener('click', function () { dlg.close(); });
      dlg.addEventListener('click', function (e) { if (e.target === dlg) dlg.close(); });

      var copy = dlg.querySelector('.bibtex-copy');
      copy.addEventListener('click', function () {
        var text = dlg.querySelector('.bibtex-code').textContent;
        navigator.clipboard.writeText(text).then(function () {
          var original = copy.textContent;
          copy.textContent = 'Copied!';
          setTimeout(function () { copy.textContent = original; }, 1500);
        });
      });
    });
  })();
</script>
